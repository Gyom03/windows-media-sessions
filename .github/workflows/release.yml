name: Release

# Triggers on tags like v1.0.1, v2.3.4-beta.1, ...
# Workflow: rebuild from clean checkout, verify the tag matches package.json,
# publish to npm with provenance, then create a GitHub Release with auto-generated
# notes from the commits since the previous tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release to create the Release
  id-token: write   # required by npm for OIDC provenance attestations

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Setting registry-url makes setup-node write an .npmrc with the
          # auth token, which `npm publish` then picks up automatically.
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test

      - name: Build .NET backend
        shell: pwsh
        run: ./scripts/build-backend.ps1

      - name: Build TypeScript package
        run: npm --workspace packages/node run build

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $pkg = (Get-Content packages/node/package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            throw "Tag version ($tag) does not match package.json version ($pkg). Run npm version <bump> before tagging."
          }
          Write-Host "Tag $tag matches package.json"

      - name: Publish to npm
        working-directory: packages/node
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/node/bin/win-x64/windows-media-sessions-backend.exe
