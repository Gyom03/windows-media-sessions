name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/node/package-lock.json

      - name: Install Node dependencies
        working-directory: packages/node
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: packages/node
        run: npm run lint

      - name: Typecheck
        working-directory: packages/node
        run: npm run typecheck

      - name: Test
        working-directory: packages/node
        run: npm test

      - name: Build .NET backend
        shell: pwsh
        run: ./scripts/build-backend.ps1

      - name: Build TypeScript package
        working-directory: packages/node
        run: npm run build

      - name: Verify package contents
        working-directory: packages/node
        shell: pwsh
        run: |
          npm pack --dry-run
          if (-not (Test-Path 'bin/win-x64/windows-media-sessions-backend.exe')) {
            throw 'Backend executable missing from bin/'
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-media-sessions-pkg
          path: packages/node/
          if-no-files-found: error
